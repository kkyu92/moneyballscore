name = "moneyballscore-cron"
main = "src/worker.ts"
compatibility_date = "2026-01-15"
compatibility_flags = ["nodejs_compat"]

# Cloudflare Workers Cron Triggers — 무료 tier 100k requests/day, 분 단위 fire 가능.
# GH Actions 와 달리 high-load skip 거의 없음. 분 17 그대로 옮겼지만
# CF 는 분 영향 적어 정시 (분 0) 도 안전. 일단 GH 와 동일 시각으로 두고
# 운영 후 분 0 으로 단순화해도 됨.
[triggers]
crons = [
  "17 0 * * *",     # KST 09:17 announce
  "17 1-12 * * *",  # KST 10-21:17 predict 매시간
  "17 13 * * *",    # KST 22:17 predict_final
  "17 14 * * *",    # KST 23:17 verify
]

# vars 는 wrangler.toml 에 둬도 되지만 secrets 는 dashboard 또는
# `wrangler secret put <NAME>` 으로 등록 (CRON_SECRET, SUPABASE_SERVICE_KEY).
[vars]
PIPELINE_URL = "https://moneyballscore.vercel.app/api/pipeline"
SUPABASE_URL = "https://utmimgpccbrciwuuacyw.supabase.co"

# 관측: 실패 시 Tail logs 로 확인. wrangler tail 로 실시간 스트림.
[observability]
enabled = true
