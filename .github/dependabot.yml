version: 2
updates:
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: "09:00"
      timezone: Asia/Seoul
    open-pull-requests-limit: 5
    versioning-strategy: increase
    labels:
      - dependencies
      - hub-dispatch
    commit-message:
      prefix: deps
      include: scope
    groups:
      types:
        patterns:
          - "@types/*"
      lint-format:
        patterns:
          - "eslint*"
          - "prettier*"
          - "@typescript-eslint/*"
      test-tooling:
        patterns:
          - "vitest*"
          - "@vitest/*"
          - "playwright*"

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: "09:00"
      timezone: Asia/Seoul
    open-pull-requests-limit: 5
    labels:
      - dependencies
      - github-actions
      - hub-dispatch
    commit-message:
      prefix: ci
      include: scope
