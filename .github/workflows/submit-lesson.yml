name: "📚 Submit Lesson/Policy to Playbook"

# Phase 4a D4 — `lesson:` + `policy:` / `feedback:` / `memory:` prefix commit 모두
# 허브 worker-lesson 채널로 dispatch. lesson 외 prefix 는 payload subtype=self-policy
# 로 표시 → 허브에서 별도 label `self-policy` Issue (Journal PR skip).
#
# 2026-04-30 — PR 머지 commit 검출 갭 fix. head_commit 만 검사하던 현행 로직은
# PR 머지 시 GitHub default merge commit 메시지 ("Merge pull request #N from ...")
# 가 4 prefix 미해당이라 silent skip. push event 의 commits 배열 loop 추가하여
# 머지 commit 안에 포함된 lesson commit 도 검출 (허브 #84 evidence #2).
#
# 2026-05-01 — Conventional Commit scope-prefix matcher 갭 fix. `lesson(skill):` /
# `lesson(model):` 등 scope 접미 prefix 가 silent skip 되던 갭 차단. develop-cycle
# 첫·두 번째 시범 fire 의 lesson commit (a83f75f / aa13056) 둘 다 허브 흡수 0건
# 검증 후 발견. bash =~ regex + jq test() 양쪽 정정 + PREFIX 추출 grep -oE 로
# normalization. 본 fix 자체는 `fix(workflow):` prefix 라 흡수 비대상.
#
# 2026-05-01 (2nd) — squash-merge silent skip 갭 fix. PR title 이 4 prefix 외이고
# (예: `model: ...`, `feat: ...`) 안에 lesson commit 이 포함된 PR 을 squash 머지
# 하면, head_commit + commits 배열 모두 squash 결과 (PR title) 만 보유 → silent
# skip. 직전 (1st) fix 가 commits 배열 loop 추가했으나 squash 케이스는 commits
# 배열 자체가 단일 squash commit 만 가져 매칭 불가. 본 fix 는 head_commit 메시지
# 첫 줄에서 `(#NN)` 추출 → `gh api repos/.../pulls/NN/commits` 호출 → squash 전
# 원본 commit 들 안에서 4 prefix 검색. PR #32 가 본 갭 회피 위해 `--merge` 사용
# 했던 정책 의존성 제거. default GITHUB_TOKEN 의 pull-requests: read 권한 사용.

on:
  push:
    branches: [main]

permissions:
  contents: read
  pull-requests: read

jobs:
  submit:
    runs-on: ubuntu-latest
    steps:
      - name: Find lesson commit in push
        id: find
        env:
          COMMITS_JSON: ${{ toJSON(github.event.commits) }}
          HEAD_MSG: ${{ github.event.head_commit.message }}
          HEAD_SHA: ${{ github.sha }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPOSITORY: ${{ github.repository }}
        run: |
          # 1. head_commit prefix 매칭 우선 (직접 push 의 일반 케이스)
          # prefix: 또는 prefix(scope): 양쪽 인식 (Conventional Commit scope 갭 fix)
          for prefix in lesson policy feedback memory; do
            re="^${prefix}(\([^)]+\))?:"
            if [[ "$HEAD_MSG" =~ $re ]]; then
              {
                echo "found=true"
                echo "prefix=$prefix"
                echo "sha=$HEAD_SHA"
                echo "msg<<EOF_M"
                printf '%s' "$HEAD_MSG"
                echo
                echo "EOF_M"
              } >> "$GITHUB_OUTPUT"
              exit 0
            fi
          done

          # 2. commits 배열 loop (PR 머지 시 — head_commit 은 머지 commit 메시지)
          # prefix: + prefix(scope): 양쪽 인식
          MATCH=$(printf '%s' "$COMMITS_JSON" | jq -c '
            map(select(
              .message | test("^(lesson|policy|feedback|memory)(\\([^)]+\\))?:")
            )) | .[0] // empty
          ')

          if [ -n "$MATCH" ] && [ "$MATCH" != "null" ]; then
            MSG=$(printf '%s' "$MATCH" | jq -r .message)
            SHA=$(printf '%s' "$MATCH" | jq -r .id)
            # prefix 만 추출 (scope 제외) — 후속 단계 (subtype / TITLE) 일관성 유지
            PREFIX=$(printf '%s' "$MSG" | head -1 | grep -oE '^(lesson|policy|feedback|memory)')

            {
              echo "found=true"
              echo "prefix=$PREFIX"
              echo "sha=$SHA"
              echo "msg<<EOF_M"
              printf '%s' "$MSG"
              echo
              echo "EOF_M"
            } >> "$GITHUB_OUTPUT"
            echo "PR 머지에서 lesson commit 검출: $SHA ($PREFIX:)"
            exit 0
          fi

          # 3. squash-merge 갭 fallback — head_commit (#NN) 추출 → PR /commits API 조회
          # PR title 이 4 prefix 외이고 안에 lesson commit 포함된 PR 을 squash 머지하면
          # commits 배열엔 squash 결과 (PR title) 만 남아 매칭 불가. PR API 로 squash
          # 전 원본 commit 들 조회 후 검색.
          PR_NUM=$(printf '%s' "$HEAD_MSG" | head -1 | grep -oE '\(#[0-9]+\)' | tail -1 | grep -oE '[0-9]+' || true)
          if [ -z "$PR_NUM" ]; then
            echo "found=false" >> "$GITHUB_OUTPUT"
            echo "lesson commit 없음 — skip (head_commit + commits 배열 + (#NN) 패턴 모두 매칭 X)"
            exit 0
          fi

          echo "Squash merge 의심 — PR #$PR_NUM /commits 조회"
          PR_COMMITS=$(gh api "repos/${GITHUB_REPOSITORY}/pulls/${PR_NUM}/commits" --paginate 2>/dev/null || echo '[]')
          SQUASH_MATCH=$(printf '%s' "$PR_COMMITS" | jq -c '
            map({sha: .sha, message: .commit.message} | select(
              .message | test("^(lesson|policy|feedback|memory)(\\([^)]+\\))?:")
            )) | .[0] // empty
          ')

          if [ -z "$SQUASH_MATCH" ] || [ "$SQUASH_MATCH" = "null" ]; then
            echo "found=false" >> "$GITHUB_OUTPUT"
            echo "lesson commit 없음 — skip (PR #$PR_NUM commits 안에도 4 prefix 없음)"
            exit 0
          fi

          MSG=$(printf '%s' "$SQUASH_MATCH" | jq -r .message)
          SHA=$(printf '%s' "$SQUASH_MATCH" | jq -r .sha)
          PREFIX=$(printf '%s' "$MSG" | head -1 | grep -oE '^(lesson|policy|feedback|memory)')

          {
            echo "found=true"
            echo "prefix=$PREFIX"
            echo "sha=$SHA"
            echo "msg<<EOF_M"
            printf '%s' "$MSG"
            echo
            echo "EOF_M"
          } >> "$GITHUB_OUTPUT"
          echo "Squash merge PR #$PR_NUM commits 안에서 lesson commit 검출: $SHA ($PREFIX:)"

      - name: Determine subtype
        if: steps.find.outputs.found == 'true'
        id: classify
        env:
          PREFIX: ${{ steps.find.outputs.prefix }}
        run: |
          # lesson = 기존 (subtype 미지정), 그 외 = self-policy (Phase 4a D4)
          if [ "$PREFIX" = "lesson" ]; then
            echo "subtype=" >> "$GITHUB_OUTPUT"
          else
            echo "subtype=self-policy" >> "$GITHUB_OUTPUT"
          fi

      - name: Extract title & body
        if: steps.find.outputs.found == 'true'
        id: extract
        env:
          MSG: ${{ steps.find.outputs.msg }}
          PREFIX: ${{ steps.find.outputs.prefix }}
        run: |
          # prefix: 또는 prefix(scope): 둘 다 처리
          TITLE=$(printf '%s' "$MSG" | head -1 | sed -E "s/^${PREFIX}(\([^)]+\))?:[[:space:]]*//")
          echo "title=$TITLE" >> "$GITHUB_OUTPUT"
          {
            echo "body<<EOF_LESSON"
            printf '%s' "$MSG" | tail -n +2
            echo
            echo "EOF_LESSON"
          } >> "$GITHUB_OUTPUT"

      - name: Dispatch to playbook
        if: steps.find.outputs.found == 'true'
        env:
          GH_TOKEN: ${{ secrets.PLAYBOOK_PAT }}
          TITLE: ${{ steps.extract.outputs.title }}
          BODY: ${{ steps.extract.outputs.body }}
          SUBTYPE: ${{ steps.classify.outputs.subtype }}
          FINGERPRINT: ${{ steps.find.outputs.sha }}
        run: |
          gh api repos/kkyu92/playbook/dispatches \
            -f event_type=worker-lesson \
            -f "client_payload[source_repo]=${GITHUB_REPOSITORY}" \
            -f "client_payload[title]=${TITLE}" \
            -f "client_payload[body]=${BODY}" \
            -f "client_payload[type]=lesson" \
            -f "client_payload[subtype]=${SUBTYPE}" \
            -f "client_payload[fingerprint]=${FINGERPRINT}"
