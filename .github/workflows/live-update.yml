name: Live Game Update

on:
  schedule:
    # v4-3 Task 4: 경기 시간대 10분 간격 (KST 18:00~00:50 = UTC 09:00~15:50)
    # 이전 9-13(~22:30 KST)에서 2시간 확장 — 연장 경기·더블헤더 커버 +
    # postview 자동 트리거 (경기 종료 감지 시 즉시 사후 분석 실행).
    # 00:50 이후 극단 케이스는 다음날 daily-pipeline 15 KST morning run에서 cleanup.
    - cron: '*/10 9-15 * * *'
  workflow_dispatch:

jobs:
  update-live:
    runs-on: ubuntu-latest
    timeout-minutes: 3

    steps:
      - name: Update live games
        env:
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
        run: |
          LIVE_URL="${{ secrets.PRODUCTION_URL }}/api/live"

          echo "Updating live games..."
          RESPONSE=$(curl -sf -X POST "$LIVE_URL" \
            -H "Content-Type: application/json" \
            -H "Authorization: Bearer $CRON_SECRET" \
            -d '{}' 2>&1) || true

          echo "$RESPONSE" | jq . 2>/dev/null || echo "$RESPONSE"

          # 활성 경기가 없으면 조기 종료 (정상)
          LIVE=$(echo "$RESPONSE" | jq -r '.liveGames // 0' 2>/dev/null)
          if [ "$LIVE" = "0" ]; then
            echo "No active games. Done."
          fi

      - name: Notify playbook on failure
        if: failure()
        env:
          GH_TOKEN: ${{ secrets.PLAYBOOK_PAT }}
          WORKFLOW_NAME: ${{ github.workflow }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          BRANCH: ${{ github.ref_name }}
          COMMIT_SHA: ${{ github.sha }}
        run: |
          set -e
          TITLE="${WORKFLOW_NAME} 실패"
          BODY="Workflow: ${WORKFLOW_NAME}
          Run: ${RUN_URL}
          Branch: ${BRANCH}
          Commit: ${COMMIT_SHA}"
          gh api repos/kkyu92/playbook/dispatches \
            -f event_type=worker-error \
            -f "client_payload[source_repo]=${GITHUB_REPOSITORY}" \
            -f "client_payload[title]=${TITLE}" \
            -f "client_payload[body]=${BODY}" \
            -f "client_payload[type]=error-log"
