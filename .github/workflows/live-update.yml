name: Live Game Update

# 2026-04-29: schedule trigger 를 Cloudflare Worker (cloudflare-worker/)
# "*/10 9-15 * * *" cron 으로 이관. KST 18:00~00:50 매 10분.
# workflow_dispatch 는 수동 trigger / 외부 dispatch 용 보존.

on:
  workflow_dispatch:

jobs:
  update-live:
    runs-on: ubuntu-latest
    timeout-minutes: 3

    steps:
      - name: Update live games
        env:
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
        run: |
          LIVE_URL="${{ secrets.PRODUCTION_URL }}/api/live"

          echo "Updating live games..."
          RESPONSE=$(curl -sf -X POST "$LIVE_URL" \
            -H "Content-Type: application/json" \
            -H "Authorization: Bearer $CRON_SECRET" \
            -d '{}' 2>&1) || true

          echo "$RESPONSE" | jq . 2>/dev/null || echo "$RESPONSE"

          # 활성 경기가 없으면 조기 종료 (정상)
          LIVE=$(echo "$RESPONSE" | jq -r '.liveGames // 0' 2>/dev/null)
          if [ "$LIVE" = "0" ]; then
            echo "No active games. Done."
          fi

      - name: Notify playbook on failure
        if: failure()
        env:
          GH_TOKEN: ${{ secrets.PLAYBOOK_PAT }}
          WORKFLOW_NAME: ${{ github.workflow }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          BRANCH: ${{ github.ref_name }}
          COMMIT_SHA: ${{ github.sha }}
        run: |
          set -e
          TITLE="${WORKFLOW_NAME} 실패"
          BODY="Workflow: ${WORKFLOW_NAME}
          Run: ${RUN_URL}
          Branch: ${BRANCH}
          Commit: ${COMMIT_SHA}"
          gh api repos/kkyu92/playbook/dispatches \
            -f event_type=worker-error \
            -f "client_payload[source_repo]=${GITHUB_REPOSITORY}" \
            -f "client_payload[title]=${TITLE}" \
            -f "client_payload[body]=${BODY}" \
            -f "client_payload[type]=error-log" \
            -f "client_payload[severity]=error" \
            -f "client_payload[fingerprint]=cron-live-update-failure" \
            -f "client_payload[environment]=production" \
            -f "client_payload[run_url]=${RUN_URL}"
