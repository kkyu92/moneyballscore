name: Daily KBO Pipeline

on:
  schedule:
    # 분 오프셋 17 — GitHub 공식 권고: 정각(0분)은 전체 플랫폼 high-load 피크,
    # 2026-04-23 관측 12/15 cron skip (80%). 정각 회피로 skip 확률 감소.
    - cron: '17 0 * * *'    # UTC 00:17 ≈ KST 09:17 announce
    - cron: '17 1-12 * * *' # UTC 01-12:17 매시간 predict
    - cron: '17 13 * * *'   # UTC 13:17 ≈ KST 22:17 predict_final (gap 체크)
    - cron: '17 14 * * *'   # UTC 14:17 ≈ KST 23:17 verify (accuracy + compound)
  workflow_dispatch:
    inputs:
      date:
        description: 'Target date (YYYY-MM-DD, default: today KST)'
        required: false
      mode:
        description: 'Pipeline mode'
        required: false
        default: 'predict'
        type: choice
        options:
          - announce
          - predict
          - predict_final
          - verify

# Codex #1 — 중복 실행 방지. cron 재시도·수동·지연 실행이 겹칠 때
# 기존 run 유지 + 새 run 큐 대기. first-write-wins 구조의 race 차단.
concurrency:
  group: daily-pipeline
  cancel-in-progress: false

jobs:
  run-pipeline:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'pnpm'

      - run: pnpm install --frozen-lockfile

      - name: Determine mode
        id: mode
        env:
          INPUT_MODE: ${{ github.event.inputs.mode }}
          INPUT_DATE: ${{ github.event.inputs.date }}
          EVENT_NAME: ${{ github.event_name }}
        run: |
          if [ "$EVENT_NAME" = "workflow_dispatch" ]; then
            echo "mode=$INPUT_MODE" >> $GITHUB_OUTPUT
            echo "date=$INPUT_DATE" >> $GITHUB_OUTPUT
          else
            HOUR=$(date -u +%H)
            # UTC 00 → announce / 01-12 → predict / 13 → predict_final / 14 → verify
            if [ "$HOUR" = "00" ]; then
              MODE="announce"
            elif [ "$HOUR" -ge 1 ] && [ "$HOUR" -le 12 ]; then
              MODE="predict"
            elif [ "$HOUR" = "13" ]; then
              MODE="predict_final"
            elif [ "$HOUR" = "14" ]; then
              MODE="verify"
            else
              MODE="predict"
            fi
            echo "mode=$MODE" >> $GITHUB_OUTPUT
            echo "date=" >> $GITHUB_OUTPUT
          fi

      - name: Run pipeline
        env:
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
        run: |
          PIPELINE_URL="${{ secrets.PRODUCTION_URL }}/api/pipeline"
          MODE="${{ steps.mode.outputs.mode }}"
          DATE="${{ steps.mode.outputs.date }}"

          BODY="{\"mode\":\"${MODE}\",\"triggeredBy\":\"cron\""
          if [ -n "$DATE" ]; then
            BODY="${BODY},\"date\":\"${DATE}\""
          fi
          BODY="${BODY}}"

          echo "Calling pipeline: mode=$MODE date=$DATE"
          curl -sf -X POST "$PIPELINE_URL" \
            -H "Content-Type: application/json" \
            -H "Authorization: Bearer $CRON_SECRET" \
            -d "$BODY" | jq .

      - name: Notify playbook on failure
        if: failure()
        env:
          GH_TOKEN: ${{ secrets.PLAYBOOK_PAT }}
          WORKFLOW_NAME: ${{ github.workflow }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          BRANCH: ${{ github.ref_name }}
          COMMIT_SHA: ${{ github.sha }}
        run: |
          set -e
          TITLE="${WORKFLOW_NAME} 실패"
          BODY="Workflow: ${WORKFLOW_NAME}
          Run: ${RUN_URL}
          Branch: ${BRANCH}
          Commit: ${COMMIT_SHA}"
          gh api repos/kkyu92/playbook/dispatches \
            -f event_type=worker-error \
            -f "client_payload[source_repo]=${GITHUB_REPOSITORY}" \
            -f "client_payload[title]=${TITLE}" \
            -f "client_payload[body]=${BODY}" \
            -f "client_payload[type]=error-log" \
            -f "client_payload[severity]=error" \
            -f "client_payload[fingerprint]=cron-daily-pipeline-failure" \
            -f "client_payload[environment]=production" \
            -f "client_payload[run_url]=${RUN_URL}"
