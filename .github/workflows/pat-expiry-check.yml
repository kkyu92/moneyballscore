name: PLAYBOOK_PAT Expiry Check

on:
  schedule:
    # 매월 1일 0시 UTC (KST 09:00) — 월 1회 체크
    - cron: '0 0 1 * *'
  workflow_dispatch:

jobs:
  check:
    runs-on: ubuntu-latest
    timeout-minutes: 2
    steps:
      - name: Check PLAYBOOK_PAT expiry and dispatch outcome
        env:
          GH_TOKEN: ${{ secrets.PLAYBOOK_PAT }}
          PAT: ${{ secrets.PLAYBOOK_PAT }}
        run: |
          set -e

          dispatch() {
            local title="$1"
            local body="$2"
            local type="$3"
            gh api repos/kkyu92/playbook/dispatches \
              -f event_type=worker-error \
              -f "client_payload[source_repo]=${GITHUB_REPOSITORY}" \
              -f "client_payload[title]=${title}" \
              -f "client_payload[body]=${body}" \
              -f "client_payload[type]=${type}"
          }

          RUN_URL="${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"

          HEADER=$(curl -sI -H "Authorization: Bearer $PAT" https://api.github.com/user \
            | awk -F': ' 'tolower($1)=="github-authentication-token-expiration"{sub(/\r$/, "", $2); print $2}')

          # 가드 — 헤더 미존재: silent 실패 대신 허브에 명시적 알림
          if [ -z "$HEADER" ]; then
            echo "No expiry header returned"
            BODY=$(cat <<EOF
          PLAYBOOK_PAT 로 GET /user 호출은 성공했으나 github-authentication-token-expiration 헤더가 없음.

          원인 후보:
          - Classic PAT (만료 없음) — fine-grained 로 마이그레이션 권장
          - GitHub API 헤더 네이밍 변경

          조치: https://github.com/settings/tokens 에서 fine-grained PAT 재발급 + Repository secrets 갱신.

          Run: ${RUN_URL}
          EOF
          )
            dispatch "PLAYBOOK_PAT: 만료 헤더 미존재 (fine-grained 확인 필요)" "$BODY" "pat-header-missing"
            exit 0
          fi

          echo "Raw expiry: $HEADER"

          # 가드 — 파싱 실패: 실 헤더 값을 body 에 싣고 dispatch
          EXPIRY_EPOCH=$(date -u -d "$HEADER" +%s 2>/dev/null || true)
          if [ -z "$EXPIRY_EPOCH" ] || [ "$EXPIRY_EPOCH" = "0" ]; then
            BODY=$(cat <<EOF
          github-authentication-token-expiration 헤더 값을 GNU date 로 파싱 실패.

          Raw header: ${HEADER}

          포맷 확인 후 워크플로 파서 수정 필요.
          Run: ${RUN_URL}
          EOF
          )
            dispatch "PLAYBOOK_PAT: 만료일 파싱 실패" "$BODY" "pat-parse-error"
            exit 0
          fi

          NOW_EPOCH=$(date -u +%s)
          DAYS_LEFT=$(( (EXPIRY_EPOCH - NOW_EPOCH) / 86400 ))
          EXPIRY_DATE=$(date -u -d "$HEADER" +%Y-%m-%d)

          echo "PAT expires in ${DAYS_LEFT} days (${EXPIRY_DATE})"

          if [ "$DAYS_LEFT" -gt 14 ]; then
            echo "More than 14 days left — no alert."
            exit 0
          fi

          TITLE="PLAYBOOK_PAT 만료 임박: ${EXPIRY_DATE}"
          BODY=$(cat <<EOF
          PLAYBOOK_PAT 이 ${DAYS_LEFT}일 후 (${EXPIRY_DATE}) 만료됩니다.

          조치:
          1. https://github.com/settings/tokens 에서 PAT 재발급 (만료 연장 또는 신규)
          2. moneyballscore Repository secrets → PLAYBOOK_PAT 값 갱신

          Run: ${RUN_URL}
          EOF
          )
          dispatch "$TITLE" "$BODY" "pat-expiry"

      - name: Notify playbook on workflow-level failure
        if: failure()
        env:
          GH_TOKEN: ${{ secrets.PLAYBOOK_PAT }}
          WORKFLOW_NAME: ${{ github.workflow }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          set -e
          TITLE="${WORKFLOW_NAME} 워크플로 자체 실패"
          BODY="Workflow: ${WORKFLOW_NAME}
          Run: ${RUN_URL}
          (체크 스텝 내부 dispatch 실패 또는 unexpected 종료 — PAT 자체가 invalid 할 가능성 포함)"
          gh api repos/kkyu92/playbook/dispatches \
            -f event_type=worker-error \
            -f "client_payload[source_repo]=${GITHUB_REPOSITORY}" \
            -f "client_payload[title]=${TITLE}" \
            -f "client_payload[body]=${BODY}" \
            -f "client_payload[type]=error-log"
