name: PLAYBOOK_PAT Expiry Check

on:
  schedule:
    # 매월 1일 0시 UTC (KST 09:00) — 월 1회 체크
    - cron: '0 0 1 * *'
  workflow_dispatch:

jobs:
  check:
    runs-on: ubuntu-latest
    timeout-minutes: 2
    steps:
      - name: Check PLAYBOOK_PAT expiry and dispatch on ≤14 days
        env:
          GH_TOKEN: ${{ secrets.PLAYBOOK_PAT }}
          PAT: ${{ secrets.PLAYBOOK_PAT }}
        run: |
          set -e

          HEADER=$(curl -sI -H "Authorization: Bearer $PAT" https://api.github.com/user \
            | awk -F': ' 'tolower($1)=="github-authentication-token-expiration"{sub(/\r$/, "", $2); print $2}')

          if [ -z "$HEADER" ]; then
            echo "No expiry header returned — PAT is likely classic without expiration. Nothing to warn."
            exit 0
          fi

          echo "Raw expiry: $HEADER"
          EXPIRY_EPOCH=$(date -u -d "$HEADER" +%s)
          NOW_EPOCH=$(date -u +%s)
          DAYS_LEFT=$(( (EXPIRY_EPOCH - NOW_EPOCH) / 86400 ))
          EXPIRY_DATE=$(date -u -d "$HEADER" +%Y-%m-%d)

          echo "PAT expires in ${DAYS_LEFT} days (${EXPIRY_DATE})"

          if [ "$DAYS_LEFT" -gt 14 ]; then
            echo "More than 14 days left — no alert."
            exit 0
          fi

          TITLE="PLAYBOOK_PAT 만료 임박: ${EXPIRY_DATE}"
          BODY=$(cat <<EOF
          PLAYBOOK_PAT 이 ${DAYS_LEFT}일 후 (${EXPIRY_DATE}) 만료됩니다.

          조치:
          1. https://github.com/settings/tokens 에서 PAT 재발급 (만료 연장 또는 신규)
          2. moneyballscore Repository secrets → PLAYBOOK_PAT 값 갱신

          Run: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          EOF
          )

          gh api repos/kkyu92/playbook/dispatches \
            -f event_type=worker-error \
            -f "client_payload[source_repo]=${GITHUB_REPOSITORY}" \
            -f "client_payload[title]=${TITLE}" \
            -f "client_payload[body]=${BODY}" \
            -f "client_payload[type]=pat-expiry"

      - name: Notify playbook on failure
        if: failure()
        env:
          GH_TOKEN: ${{ secrets.PLAYBOOK_PAT }}
          WORKFLOW_NAME: ${{ github.workflow }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          set -e
          TITLE="${WORKFLOW_NAME} 실패"
          BODY="Workflow: ${WORKFLOW_NAME}
          Run: ${RUN_URL}
          (PAT 만료 체크 자체가 실패했다면 이미 PAT이 죽었을 가능성 있음)"
          gh api repos/kkyu92/playbook/dispatches \
            -f event_type=worker-error \
            -f "client_payload[source_repo]=${GITHUB_REPOSITORY}" \
            -f "client_payload[title]=${TITLE}" \
            -f "client_payload[body]=${BODY}" \
            -f "client_payload[type]=error-log"
