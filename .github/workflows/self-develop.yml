name: "🤖 Self-Development"

# Phase 5a — self-develop closed loop. cloudflare-worker 의 daily cron
# (0 0 * * * = KST 09:00) 이 workflow_dispatch fire. self-hosted [home] runner
# 위에서 claude-code-action 이 진단 → 결정 (auto/issue/skip) → 실행. 4 prefix
# (lesson/policy/feedback/memory) commit 자동으로 submit-lesson.yml dispatch
# → 허브 (kkyu92/playbook) auto-ingest 흡수.
#
# 비용: $0 (CLAUDE_CODE_OAUTH_TOKEN 구독 OAuth 사용, ANTHROPIC_API_KEY 추가 X).
# 메타 회고: 10 fire = 1 closed cycle, run 카운트 % 10 === 0 시 횡단 분석 → lesson:.

on:
  workflow_dispatch:

jobs:
  develop:
    runs-on: [self-hosted, home]
    permissions:
      contents: write
      issues: write
      pull-requests: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: pnpm/action-setup@v4
        # version 명시 X — packageManager: pnpm@10.33.0 (package.json) 사용.
        # 드리프트 사례 3 (version: 9 vs packageManager 충돌) 회피.

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Run Claude Code self-develop
        uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          github_token: ${{ secrets.GITHUB_TOKEN }}
          prompt: |
            너는 머니볼 워커의 self-develop agent. 본 fire = 1 cycle 의 1 fire
            (10 fire = 1 closed cycle).

            ## 진단 (gh + 파일 read)
            1. gh issue list --state open --limit 20 (label `lesson-pending` 우선)
            2. cat TODOS.md (있으면)
            3. git log --oneline -15
            4. (선택) pnpm test 현재 상태

            ## 결정 (1개 category)
            - `auto`: 자동 처리 가능 — 작은 fix, 테스트 추가, 의존성 update,
              문서 보강, dead code 정리, 작은 refactor, lesson 박제 (자체 회고)
            - `issue`: 사용자 개입 필요 — 큰 feature, 보안/외부 결합 결정, 비파괴
            - `skip`: 오늘 할 일 없음 (exit 0, "no work today" 코멘트만)

            ## auto 처리 시
            1. 작업 진행 + pnpm test 통과 확인
            2. commit prefix 결정:
               - 코드 fix/feature → `feat:` / `fix:` / `refactor:` (허브 dispatch X)
               - 자체 회고/패턴 박제 → `lesson:` prefix (허브 dispatch ✅, 양방향 흡수)
               - 정책/메모리 변경 → `policy:` / `feedback:` / `memory:`
                 (허브 dispatch ✅)
            3. branch `self-dev/<date>-<slug>` + PR
               (label `self-dev`, assignee kkyu92)
            4. 처리한 lesson-pending Issue 가 있으면 그 Issue 에 결과 코멘트

            ## issue 박제 시
            gh issue create \
              --title "self-dev/human-needed: ..." \
              --body "(필요한 결정 + 컨텍스트)" \
              --label "self-dev,human-needed"

            ## skip 시
            log "no work today" + exit 0

            ## 10/cycle 메타 회고
            - workflow run 카운트 = `gh run list --workflow=self-develop.yml --limit 100 | wc -l`
            - 카운트 % 10 === 0 시: 최근 10 run 결과 (PR/Issue) 횡단 분석
              → `lesson:` prefix commit + dispatch (허브가 메타 entry 박제)

            ## 정합 체크
            - /handoff /search /ingest skill 활용 OK (Claude Code 환경)
            - 새 GH event_type 추가 X (허브 codex finding #2 정합)
            - 4 prefix dispatch 자연 정합 (허브 흡수 자동)
            - 결과 commit + push + PR + Issue 코멘트 패턴 = blog-autopilot
              issue-agent 그대로

      - name: Self-report on failure
        if: failure()
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh label create self-dev --color "0e8a16" 2>/dev/null || true
          gh label create hub-self-report --color "b60205" 2>/dev/null || true
          gh issue create \
            --title "🚨 self-develop run #${{ github.run_id }} 실패" \
            --body "Run: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}" \
            --label "self-dev,hub-self-report"
